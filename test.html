<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p id="text"></p>
    <script>
        const text = " Cj gwapo"
        let ptext = "";
        let i = 0;

        const interval = setInterval(() => {
            if (i < text.length) {
                ptext += text[i];
                document.getElementById("text").textContent = ptext;
                i++;
            }
            else {
                clearInterval(interval);
            }
        }, 500)
    </script>
</body>

</html>
